<text x="76" y="559" font-size="11" fill="#9CA3AF" text-anchor="middle">EN</text>

<!-- ── Content ── -->
<text x="220" y="37" font-size="18" font-weight="bold" fill="#1A1A2E">AI 使用量</text>

<!-- 更新 button -->
<rect x="756" y="17" width="124" height="34" rx="17" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#s)"/>
<text x="818" y="39" font-size="13" font-weight="bold" fill="#374151" text-anchor="middle">更新</text>

<!-- Toggles row -->
<rect x="216" y="56" width="664" height="54" rx="12" fill="#FFFFFF" filter="url(#s)"/>
<text x="228" y="88" font-size="12" fill="#374151">AI Usage</text>
<rect x="294" y="72" width="40" height="22" rx="11" fill="#EF5B25"/>
<circle cx="324" cy="83" r="9" fill="white"/>
<text x="352" y="88" font-size="12" fill="#374151">Codex</text>
<rect x="396" y="72" width="40" height="22" rx="11" fill="#EF5B25"/>
<circle cx="426" cy="83" r="9" fill="white"/>
<text x="454" y="88" font-size="12" fill="#374151">Claude Code</text>
<rect x="542" y="72" width="40" height="22" rx="11" fill="#EF5B25"/>
<circle cx="572" cy="83" r="9" fill="white"/>

<!-- Codex card -->
<rect x="216" y="122" width="322" height="210" rx="12" fill="#FFFFFF" filter="url(#s)"/>

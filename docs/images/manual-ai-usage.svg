<!-- ok badge -->
<rect x="682" y="136" width="38" height="22" rx="11" fill="#FEF0EB"/>
<text x="701" y="151" font-size="11" font-weight="bold" fill="#EF5B25" text-anchor="middle">ok</text>
<text x="574" y="170" font-size="10" fill="#9CA3AF">Claude OAuth API</text>

<!-- 5h bar -->
<text x="574" y="198" font-size="11" fill="#374151">5h 使用済み</text>
<text x="852" y="198" font-size="11" fill="#F97316" text-anchor="end">79%</text>
<rect x="574" y="204" width="274" height="9" rx="4" fill="#F3F4F6"/>
<rect x="574" y="204" width="217" height="9" rx="4" fill="#F97316"/>
<text x="574" y="224" font-size="10" fill="#9CA3AF">Reset: 23:00</text>

<!-- 7d bar -->
<text x="574" y="250" font-size="11" fill="#374151">7d 使用済み</text>
<text x="852" y="250" font-size="11" fill="#374151" text-anchor="end">47%</text>
<rect x="574" y="256" width="274" height="9" rx="4" fill="#F3F4F6"/>
<rect x="574" y="256" width="129" height="9" rx="4" fill="#EF5B25"/>
<text x="574" y="276" font-size="10" fill="#9CA3AF">Reset: 火 09:00</text>
<text x="574" y="316" font-size="10" fill="#9CA3AF">Source: Claude OAuth API</text>

<!-- Advanced section (collapsed accordion) -->
<rect x="216" y="344" width="664" height="42" rx="12" fill="#FFFFFF" filter="url(#s)"/>
<text x="228" y="370" font-size="12" fill="#9CA3AF">▶ Advanced</text>
<text x="858" y="370" font-size="11" fill="#9CA3AF" text-anchor="end">sessions 自動検出 / WSL sessions / stale 判定秒数</text>

<!-- 取得間隔・stale section -->
<rect x="216" y="398" width="664" height="70" rx="12" fill="#FFFFFF" filter="url(#s)"/>
<text x="228" y="422" font-size="12" fill="#374151">取得間隔</text>
<rect x="328" y="408" width="64" height="26" rx="8" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1"/>
<text x="360" y="426" font-size="12" fill="#374151" text-anchor="middle" font-family="'Courier New',Consolas,monospace">300</text>
<text x="400" y="422" font-size="12" fill="#6B7280">秒</text>

<text x="228" y="452" font-size="12" fill="#374151">stale 判定</text>
<rect x="328" y="438" width="64" height="26" rx="8" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1"/>
<text x="360" y="456" font-size="12" fill="#374151" text-anchor="middle" font-family="'Courier New',Consolas,monospace">900</text>
<text x="400" y="452" font-size="12" fill="#6B7280">秒</text>
</svg>

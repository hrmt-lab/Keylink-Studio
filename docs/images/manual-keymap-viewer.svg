<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580" font-family="'Hiragino Sans','Meiryo','Segoe UI',sans-serif">
<defs>
  <filter id="s" x="-6%" y="-8%" width="112%" height="120%">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#BCC7D4" flood-opacity="0.45"/>
  </filter>
  <!-- inset shadow for keyboard plate (凹) -->
  <filter id="inset">
    <feOffset dx="0" dy="1"/>
    <feGaussianBlur stdDeviation="2"/>
    <feComposite in2="SourceGraphic" operator="arithmetic" k2="-1" k3="1"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
</defs>

<rect width="900" height="580" fill="#F1F3F6"/>

<!-- ── Sidebar ── -->
<rect width="200" height="580" fill="#FFFFFF"/>
<line x1="200" y1="0" x2="200" y2="580" stroke="#E8ECF1"/>
<text x="20" y="37" font-size="14" font-weight="bold" fill="#1A1A2E">RawHID Host</text>

<text x="30" y="72" font-size="13" fill="#4B5563">Dashboard</text>
<text x="30" y="110" font-size="13" fill="#4B5563">レイヤールール</text>
<text x="30" y="148" font-size="13" fill="#4B5563">アクション</text>
<text x="30" y="186" font-size="13" fill="#4B5563">時刻同期</text>
<text x="30" y="224" font-size="13" fill="#4B5563">AI 使用量</text>
<!-- キーマップ表示 ← selected -->
<rect x="8" y="240" width="184" height="34" rx="8" fill="#FEF0EB"/>
<rect x="20" y="250" width="3" height="14" rx="2" fill="#EF5B25"/>
<text x="30" y="262" font-size="13" font-weight="bold" fill="#EF5B25">キーマップ表示</text>

<text x="30" y="300" font-size="13" fill="#4B5563">デバイス</text>
<text x="30" y="338" font-size="13" fill="#4B5563">設定</text>

<rect x="14" y="540" width="76" height="28" rx="14" fill="#F0F4F8"/>
<rect x="16" y="542" width="36" height="24" rx="12" fill="#EF5B25"/>
<text x="34" y="559" font-size="11" font-weight="bold" fill="white" text-anchor="middle">JP</text>
<text x="76" y="559" font-size="11" fill="#9CA3AF" text-anchor="middle">EN</text>

<!-- ── Content ── -->
<text x="220" y="37" font-size="18" font-weight="bold" fill="#1A1A2E">キーマップ表示</text>

<!-- Device list -->
<rect x="216" y="56" width="192" height="500" rx="12" fill="#FFFFFF" filter="url(#s)"/>
<text x="228" y="78" font-size="11" fill="#9CA3AF">Studio 対応デバイス</text>

<!-- hitsuki46 selected (凹) -->
<rect x="222" y="86" width="180" height="48" rx="8" fill="#E8ECF1"/>
<text x="234" y="108" font-size="13" font-weight="bold" fill="#EF5B25">hitsuki46</text>
<text x="234" y="122" font-size="10" fill="#9CA3AF">USB · unlocked</text>

<!-- another device (unselected) -->
<rect x="234" y="144" width="32" height="32" rx="6" fill="#E8ECF1"/>
<text x="250" y="165" font-size="12" fill="#6B7280" text-anchor="middle">K</text>
<text x="276" y="156" font-size="12" fill="#374151">kb60</text>
<text x="276" y="170" font-size="10" fill="#9CA3AF">USB · unlocked</text>

<!-- Main viewer area -->
<rect x="420" y="56" width="460" height="500" rx="12" fill="#FFFFFF" filter="url(#s)"/>

<!-- Tab bar: キーマップ | ヒートマップ -->
<rect x="432" y="68" width="100" height="30" rx="15" fill="#E8ECF1"/>
<text x="482" y="88" font-size="12" font-weight="bold" fill="#EF5B25" text-anchor="middle">キーマップ</text>
<rect x="538" y="68" width="100" height="30" rx="15" fill="none"/>
<text x="588" y="88" font-size="12" fill="#9CA3AF" text-anchor="middle">ヒートマップ</text>
<rect x="644" y="68" width="80" height="30" rx="15" fill="none"/>
<text x="684" y="88" font-size="12" fill="#9CA3AF" text-anchor="middle">テスター</text>

<!-- Layer chips row -->
<text x="432" y="118" font-size="10" fill="#9CA3AF">レイヤー</text>
<rect x="808" y="112" width="58" height="28" rx="14" fill="#EF5B25"/>
<text x="837" y="131" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">編集</text>

<!-- Layer 0 (normal) -->
<rect x="432" y="124" width="40" height="26" rx="13" fill="#F3F4F6"/>
<text x="452" y="142" font-size="12" fill="#6B7280" text-anchor="middle">0</text>

<!-- Layer 1 (normal) -->
<rect x="478" y="124" width="40" height="26" rx="13" fill="#F3F4F6"/>
<text x="498" y="142" font-size="12" fill="#6B7280" text-anchor="middle">1</text>

<!-- Layer 2 (selected 凹 + LAYER_STATE ●) -->
<rect x="524" y="124" width="40" height="26" rx="13" fill="#E8ECF1"/>
<text x="544" y="142" font-size="12" font-weight="bold" fill="#EF5B25" text-anchor="middle">2</text>
<!-- orange ● LAYER_STATE indicator -->
<circle cx="562" cy="126" r="5" fill="#EF5B25"/>

<!-- Layer 3 -->
<rect x="572" y="124" width="40" height="26" rx="13" fill="#F3F4F6"/>
<text x="592" y="142" font-size="12" fill="#6B7280" text-anchor="middle">3</text>

<!-- Layer 4 -->
<rect x="618" y="124" width="40" height="26" rx="13" fill="#F3F4F6"/>
<text x="638" y="142" font-size="12" fill="#6B7280" text-anchor="middle">4</text>

<!-- Layer 5 -->
<rect x="664" y="124" width="40" height="26" rx="13" fill="#F3F4F6"/>
<text x="684" y="142" font-size="12" fill="#6B7280" text-anchor="middle">5</text>

<!-- Keyboard plate (凹 inset) -->
<rect x="432" y="162" width="434" height="244" rx="14" fill="#EAEEF3"/>

<!-- Row 1: number row -->
<!-- Keys are ~36x30 with 5px gap -->
<g font-size="9" fill="#1A1A2E" font-family="'Courier New',Consolas,monospace">
  <!-- key helper: x,y=top-left of key, w=width -->
  <!-- ESC -->
  <rect x="440" y="170" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="458" y="188" text-anchor="middle" font-weight="bold">ESC</text>
  <text x="472" y="196" text-anchor="end" fill="#C0C8D4" font-size="8">#0</text>
  <!-- 1 -->
  <rect x="481" y="170" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="499" y="188" text-anchor="middle" font-weight="bold">1</text>
  <text x="513" y="196" text-anchor="end" fill="#C0C8D4" font-size="8">#1</text>
  <!-- 2 -->
  <rect x="522" y="170" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="540" y="188" text-anchor="middle" font-weight="bold">2</text>
  <!-- 3 -->
  <rect x="563" y="170" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="581" y="188" text-anchor="middle" font-weight="bold">3</text>
  <!-- 4 -->
  <rect x="604" y="170" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="622" y="188" text-anchor="middle" font-weight="bold">4</text>
  <!-- 5 -->
  <rect x="645" y="170" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="663" y="188" text-anchor="middle" font-weight="bold">5</text>
  <!-- 6 -->
  <rect x="686" y="170" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="704" y="188" text-anchor="middle" font-weight="bold">6</text>
  <!-- 7 -->
  <rect x="727" y="170" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="745" y="188" text-anchor="middle" font-weight="bold">7</text>
  <!-- 8 -->
  <rect x="768" y="170" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="786" y="188" text-anchor="middle" font-weight="bold">8</text>
  <!-- BSPC (wider) -->
  <rect x="809" y="170" width="52" height="30" rx="6" fill="#FFFFFF"/>
  <text x="835" y="188" text-anchor="middle" font-weight="bold">BSPC</text>

  <!-- Row 2: QWERTY -->
  <!-- TAB (wider) -->
  <rect x="440" y="205" width="52" height="30" rx="6" fill="#FFFFFF"/>
  <text x="466" y="223" text-anchor="middle" font-weight="bold">TAB</text>
  <!-- Q -->
  <rect x="497" y="205" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="515" y="223" text-anchor="middle" font-weight="bold">Q</text>
  <!-- W -->
  <rect x="538" y="205" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="556" y="223" text-anchor="middle" font-weight="bold">W</text>
  <!-- E -->
  <rect x="579" y="205" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="597" y="223" text-anchor="middle" font-weight="bold">E</text>
  <!-- R -->
  <rect x="620" y="205" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="638" y="223" text-anchor="middle" font-weight="bold">R</text>
  <!-- T -->
  <rect x="661" y="205" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="679" y="223" text-anchor="middle" font-weight="bold">T</text>
  <!-- Y -->
  <rect x="702" y="205" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="720" y="223" text-anchor="middle" font-weight="bold">Y</text>
  <!-- U -->
  <rect x="743" y="205" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="761" y="223" text-anchor="middle" font-weight="bold">U</text>
  <!-- I -->
  <rect x="784" y="205" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="802" y="223" text-anchor="middle" font-weight="bold">I</text>
  <!-- O -->
  <rect x="825" y="205" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="843" y="223" text-anchor="middle" font-weight="bold">O</text>

  <!-- Row 3: Home row -->
  <!-- LCTRL -->
  <rect x="440" y="240" width="54" height="30" rx="6" fill="#FFFFFF"/>
  <text x="467" y="258" text-anchor="middle">LCTRL</text>
  <!-- A -->
  <rect x="499" y="240" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="517" y="258" text-anchor="middle" font-weight="bold">A</text>
  <!-- S -->
  <rect x="540" y="240" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="558" y="258" text-anchor="middle" font-weight="bold">S</text>
  <!-- D -->
  <rect x="581" y="240" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="599" y="258" text-anchor="middle" font-weight="bold">D</text>
  <!-- F -->
  <rect x="622" y="240" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="640" y="258" text-anchor="middle" font-weight="bold">F</text>
  <!-- G -->
  <rect x="663" y="240" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="681" y="258" text-anchor="middle" font-weight="bold">G</text>
  <!-- H -->
  <rect x="704" y="240" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="722" y="258" text-anchor="middle" font-weight="bold">H</text>
  <!-- J -->
  <rect x="745" y="240" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="763" y="258" text-anchor="middle" font-weight="bold">J</text>
  <!-- K -->
  <rect x="786" y="240" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="804" y="258" text-anchor="middle" font-weight="bold">K</text>
  <!-- ENTER (wider) -->
  <rect x="827" y="240" width="34" height="30" rx="6" fill="#FFFFFF"/>
  <text x="844" y="258" text-anchor="middle">ENT</text>

  <!-- Row 4: bottom row -->
  <!-- LSFT -->
  <rect x="440" y="275" width="60" height="30" rx="6" fill="#FFFFFF"/>
  <text x="470" y="293" text-anchor="middle">LSFT</text>
  <!-- Z -->
  <rect x="505" y="275" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="523" y="293" text-anchor="middle" font-weight="bold">Z</text>
  <!-- X -->
  <rect x="546" y="275" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="564" y="293" text-anchor="middle" font-weight="bold">X</text>
  <!-- C -->
  <rect x="587" y="275" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="605" y="293" text-anchor="middle" font-weight="bold">C</text>
  <!-- V -->
  <rect x="628" y="275" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="646" y="293" text-anchor="middle" font-weight="bold">V</text>
  <!-- B -->
  <rect x="669" y="275" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="687" y="293" text-anchor="middle" font-weight="bold">B</text>
  <!-- N -->
  <rect x="710" y="275" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="728" y="293" text-anchor="middle" font-weight="bold">N</text>
  <!-- M -->
  <rect x="751" y="275" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="769" y="293" text-anchor="middle" font-weight="bold">M</text>
  <!-- , -->
  <rect x="792" y="275" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="810" y="293" text-anchor="middle" font-weight="bold">,</text>
  <!-- . -->
  <rect x="833" y="275" width="28" height="30" rx="6" fill="#FFFFFF"/>
  <text x="847" y="293" text-anchor="middle" font-weight="bold">.</text>

  <!-- Row 5: thumb row -->
  <rect x="440" y="310" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="458" y="328" text-anchor="middle">LGUI</text>
  <rect x="481" y="310" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="499" y="328" text-anchor="middle">LALT</text>
  <rect x="522" y="310" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="540" y="328" text-anchor="middle">MO1</text>
  <!-- SPC (wide) -->
  <rect x="563" y="310" width="155" height="30" rx="6" fill="#FFFFFF"/>
  <text x="640" y="328" text-anchor="middle" font-weight="bold">SPC</text>
  <!-- MO2 -->
  <rect x="723" y="310" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="741" y="328" text-anchor="middle">MO2</text>
  <!-- LEFT -->
  <rect x="764" y="310" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="782" y="328" text-anchor="middle">◄</text>
  <!-- DOWN -->
  <rect x="805" y="310" width="36" height="30" rx="6" fill="#FFFFFF"/>
  <text x="823" y="328" text-anchor="middle">▼</text>
  <!-- RIGHT -->
  <rect x="846" y="310" width="15" height="30" rx="6" fill="#FFFFFF"/>
  <text x="853" y="328" text-anchor="middle">►</text>
</g>

<!-- LAYER_STATE legend -->
<text x="432" y="428" font-size="10" fill="#9CA3AF">●  = LAYER_STATE（キーボードのアクティブレイヤー）</text>
<circle cx="426" cy="424" r="5" fill="#EF5B25"/>
</svg>

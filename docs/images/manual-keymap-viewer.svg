<text x="76" y="559" font-size="11" fill="#9CA3AF" text-anchor="middle">EN</text>

<!-- Header -->
<text x="220" y="33" font-size="18" font-weight="bold" fill="#1A1A2E">キーマップ表示</text>
<rect x="606" y="17" width="80" height="34" rx="17" fill="#FFFFFF" stroke="#E5E7EB"/>
<text x="646" y="39" font-size="11" fill="#4B5563" text-anchor="middle">Export</text>
<rect x="694" y="17" width="80" height="34" rx="17" fill="#FFFFFF" stroke="#E5E7EB"/>
<text x="734" y="39" font-size="11" fill="#4B5563" text-anchor="middle">Restore</text>
<rect x="782" y="17" width="98" height="34" rx="17" fill="#FFFFFF" filter="url(#s)"/>
<text x="831" y="39" font-size="11" fill="#4B5563" text-anchor="middle">↻ 更新</text>

<!-- Studio devices: horizontal panel above viewer -->
<rect x="216" y="62" width="664" height="98" rx="12" fill="#FFFFFF" filter="url(#s)"/>
<rect x="228" y="74" width="252" height="72" rx="16" fill="#E8ECF1"/>
<text x="242" y="99" font-size="13" font-weight="bold" fill="#EF5B25">hitsuki46</text>
<rect x="390" y="84" width="34" height="20" rx="10" fill="#FFFFFF"/>
<text x="407" y="98" font-size="9" fill="#6B7280" text-anchor="middle">USB</text>
<rect x="430" y="84" width="38" height="20" rx="10" fill="#FEF0EB"/>
<text x="449" y="98" font-size="9" fill="#EF5B25" text-anchor="middle">編集可</text>
<text x="242" y="125" font-size="10" fill="#9CA3AF">COM7</text>
<rect x="488" y="74" width="252" height="72" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
<text x="502" y="99" font-size="13" fill="#374151">kb60</text>
<rect x="690" y="84" width="38" height="20" rx="10" fill="#FEF0EB"/>
<text x="709" y="98" font-size="9" fill="#EF5B25" text-anchor="middle">編集可</text>
<text x="502" y="125" font-size="10" fill="#9CA3AF">BLE Studio</text>

<!-- Viewer -->
<rect x="216" y="172" width="664" height="376" rx="12" fill="#FFFFFF" filter="url(#s)"/>
<line x1="228" y1="218" x2="868" y2="218" stroke="#F1F3F6"/>
<rect x="230" y="182" width="92" height="28" rx="14" fill="#E8ECF1"/>
<text x="276" y="201" font-size="11" font-weight="bold" fill="#EF5B25" text-anchor="middle">キーマップ</text>
<text x="360" y="201" font-size="11" fill="#9CA3AF" text-anchor="middle">Combo</text>
<text x="438" y="201" font-size="11" fill="#9CA3AF" text-anchor="middle">ヒートマップ</text>
<text x="526" y="201" font-size="11" fill="#9CA3AF" text-anchor="middle">テスター</text>

<!-- Layers and edit -->
<text x="232" y="244" font-size="10" fill="#9CA3AF">レイヤー</text>
<rect x="232" y="252" width="42" height="26" rx="13" fill="#F3F4F6"/>

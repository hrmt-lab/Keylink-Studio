<circle cx="319" cy="254" r="5" fill="#EF5B25"/>
<rect x="328" y="252" width="42" height="26" rx="13" fill="#F3F4F6"/>
<text x="349" y="270" font-size="11" fill="#6B7280" text-anchor="middle">2</text>
<rect x="798" y="244" width="66" height="30" rx="15" fill="#EF5B25"/>
<text x="831" y="264" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">編集</text>


<text x="228" y="78" font-size="12" font-weight="bold" fill="#1A1A2E">起動中のアプリ</text>
<line x1="216" y1="88" x2="458" y2="88" stroke="#F3F4F6"/>

<!-- App: Code.exe (selected) -->
<rect x="220" y="94" width="234" height="48" rx="8" fill="#FEF0EB"/>
<rect x="232" y="102" width="32" height="32" rx="8" fill="#0078D4"/>

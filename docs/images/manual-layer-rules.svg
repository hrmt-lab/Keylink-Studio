<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580" font-family="'Hiragino Sans','Meiryo','Segoe UI',sans-serif">
<defs>
  <filter id="s" x="-6%" y="-8%" width="112%" height="120%">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#BCC7D4" flood-opacity="0.45"/>
  </filter>
</defs>

<rect width="900" height="580" fill="#F1F3F6"/>

<!-- ── Sidebar ── -->
<rect width="200" height="580" fill="#FFFFFF"/>

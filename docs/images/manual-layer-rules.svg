<rect x="702" y="114" width="28" height="24" rx="12" fill="#F3F4F6"/>
<text x="716" y="131" font-size="11" fill="#6B7280" text-anchor="middle">7</text>

<!-- 追加 button -->
<rect x="744" y="112" width="120" height="28" rx="14" fill="#EF5B25"/>
<text x="804" y="131" font-size="12" font-weight="bold" fill="white" text-anchor="middle">追加</text>

<line x1="466" y1="148" x2="880" y2="148" stroke="#F3F4F6"/>

<!-- Rule card: Code.exe → Layer 2 -->
<rect x="478" y="158" width="390" height="62" rx="10" fill="#F8F9FA"/>
<rect x="490" y="170" width="32" height="32" rx="8" fill="#0078D4"/>
<text x="506" y="191" font-size="14" font-weight="bold" fill="white" text-anchor="middle">C</text>

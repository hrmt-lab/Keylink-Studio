<text x="532" y="198" font-size="11" fill="#9CA3AF">前面になったとき</text>
<text x="720" y="188" font-size="11" fill="#9CA3AF" text-anchor="middle">→</text>
<rect x="742" y="170" width="54" height="22" rx="11" fill="#FEF0EB"/>
<text x="769" y="185" font-size="11" font-weight="bold" fill="#EF5B25" text-anchor="middle">Layer 2</text>
<!-- trash -->
<text x="848" y="192" font-size="14" fill="#D1D5DB" text-anchor="middle">⌫</text>

<!-- Rule card: chrome.exe → Layer 1 -->
<rect x="478" y="228" width="390" height="62" rx="10" fill="#F8F9FA"/>
<rect x="490" y="240" width="32" height="32" rx="8" fill="#34A853"/>
<text x="506" y="261" font-size="14" font-weight="bold" fill="white" text-anchor="middle">G</text>
<text x="532" y="253" font-size="13" font-weight="bold" fill="#1A1A2E">chrome.exe</text>
<text x="532" y="268" font-size="11" fill="#9CA3AF">前面になったとき</text>
<text x="720" y="258" font-size="11" fill="#9CA3AF" text-anchor="middle">→</text>
<rect x="742" y="240" width="54" height="22" rx="11" fill="#FEF0EB"/>
<text x="769" y="255" font-size="11" font-weight="bold" fill="#EF5B25" text-anchor="middle">Layer 1</text>
<text x="848" y="262" font-size="14" fill="#D1D5DB" text-anchor="middle">⌫</text>

<!-- Rule card: Obsidian → Layer 3 -->
<rect x="478" y="298" width="390" height="62" rx="10" fill="#F8F9FA"/>
<rect x="490" y="310" width="32" height="32" rx="8" fill="#7C3AED"/>
<text x="506" y="331" font-size="14" font-weight="bold" fill="white" text-anchor="middle">O</text>
<text x="532" y="323" font-size="13" font-weight="bold" fill="#1A1A2E">Obsidian.exe</text>
<text x="532" y="338" font-size="11" fill="#9CA3AF">前面になったとき</text>

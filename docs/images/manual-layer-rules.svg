<text x="848" y="332" font-size="14" fill="#D1D5DB" text-anchor="middle">⌫</text>

<!-- 未一致時の動作 -->
<rect x="478" y="370" width="390" height="50" rx="10" fill="#F8F9FA"/>
<text x="494" y="390" font-size="11" fill="#9CA3AF">未一致時</text>
<text x="560" y="390" font-size="12" fill="#374151">アプリレイヤーを解除</text>
</svg>

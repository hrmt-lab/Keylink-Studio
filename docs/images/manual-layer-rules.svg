<text x="20" y="37" font-size="14" font-weight="bold" fill="#1A1A2E">Keylink Studio</text>

<text x="30" y="72" font-size="13" fill="#4B5563">Dashboard</text>
<!-- レイヤールール ← selected -->
<rect x="8" y="88" width="184" height="34" rx="8" fill="#FEF0EB"/>
<rect x="20" y="98" width="3" height="14" rx="2" fill="#EF5B25"/>
<text x="30" y="110" font-size="13" font-weight="bold" fill="#EF5B25">レイヤールール</text>

<text x="30" y="148" font-size="13" fill="#4B5563">アクション</text>
<text x="30" y="186" font-size="13" fill="#4B5563">時刻同期</text>
<text x="30" y="224" font-size="13" fill="#4B5563">AI 使用量</text>
<text x="30" y="262" font-size="13" fill="#4B5563">キーマップ表示</text>
<text x="30" y="300" font-size="13" fill="#4B5563">デバイス</text>
<text x="30" y="338" font-size="13" fill="#4B5563">設定</text>

<rect x="14" y="540" width="76" height="28" rx="14" fill="#F0F4F8"/>
<rect x="16" y="542" width="36" height="24" rx="12" fill="#EF5B25"/>
<text x="34" y="559" font-size="11" font-weight="bold" fill="white" text-anchor="middle">JP</text>
<text x="76" y="559" font-size="11" fill="#9CA3AF" text-anchor="middle">EN</text>

<!-- ── Content ── -->
<text x="220" y="37" font-size="18" font-weight="bold" fill="#1A1A2E">レイヤールール</text>

<!-- Device selector -->
<rect x="658" y="18" width="222" height="32" rx="8" fill="#FFFFFF" filter="url(#s)"/>
<text x="672" y="38" font-size="12" fill="#374151">hitsuki46</text>
<text x="860" y="38" font-size="10" fill="#9CA3AF" text-anchor="end">▼</text>
<!-- trash icon -->
<rect x="720" y="18" width="32" height="32" rx="8" fill="#FFFFFF" filter="url(#s)"/>
<text x="736" y="39" font-size="14" fill="#9CA3AF" text-anchor="middle">⌫</text>

<!-- Left panel: running apps -->

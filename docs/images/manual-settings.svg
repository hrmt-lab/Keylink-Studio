<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580" font-family="'Hiragino Sans','Meiryo','Segoe UI',sans-serif">
<defs>
  <filter id="s" x="-6%" y="-8%" width="112%" height="120%">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#BCC7D4" flood-opacity="0.45"/>
  </filter>
</defs>

<rect width="900" height="580" fill="#F1F3F6"/>

<!-- ── Sidebar ── -->
<rect width="200" height="580" fill="#FFFFFF"/>
<line x1="200" y1="0" x2="200" y2="580" stroke="#E8ECF1"/>
<text x="20" y="37" font-size="14" font-weight="bold" fill="#1A1A2E">RawHID Host</text>

<text x="30" y="72" font-size="13" fill="#4B5563">Dashboard</text>
<text x="30" y="110" font-size="13" fill="#4B5563">レイヤールール</text>
<text x="30" y="148" font-size="13" fill="#4B5563">アクション</text>
<text x="30" y="186" font-size="13" fill="#4B5563">時刻同期</text>
<text x="30" y="224" font-size="13" fill="#4B5563">AI 使用量</text>
<text x="30" y="262" font-size="13" fill="#4B5563">キーマップ表示</text>
<text x="30" y="300" font-size="13" fill="#4B5563">デバイス</text>
<!-- 設定 ← selected -->
<rect x="8" y="316" width="184" height="34" rx="8" fill="#FEF0EB"/>
<rect x="20" y="326" width="3" height="14" rx="2" fill="#EF5B25"/>
<text x="30" y="338" font-size="13" font-weight="bold" fill="#EF5B25">設定</text>

<rect x="14" y="540" width="76" height="28" rx="14" fill="#F0F4F8"/>
<rect x="16" y="542" width="36" height="24" rx="12" fill="#EF5B25"/>
<text x="34" y="559" font-size="11" font-weight="bold" fill="white" text-anchor="middle">JP</text>
<text x="76" y="559" font-size="11" fill="#9CA3AF" text-anchor="middle">EN</text>

<!-- ── Content ── -->
<text x="220" y="37" font-size="18" font-weight="bold" fill="#1A1A2E">設定</text>

<!-- ── 外観 section ── -->
<rect x="216" y="56" width="664" height="136" rx="12" fill="#FFFFFF" filter="url(#s)"/>
<text x="228" y="80" font-size="13" font-weight="bold" fill="#1A1A2E">外観</text>
<text x="228" y="98" font-size="12" fill="#374151">アクセント色</text>

<!-- Color swatches row -->
<!-- Orange (selected, 凸 raised with checkmark) -->
<rect x="228" y="106" width="36" height="36" rx="18" fill="#EF5B25"/>
<text x="246" y="130" font-size="14" fill="white" text-anchor="middle">✓</text>

<!-- Blue -->
<rect x="272" y="106" width="36" height="36" rx="18" fill="#3B82F6"/>

<!-- Teal -->
<rect x="316" y="106" width="36" height="36" rx="18" fill="#14B8A6"/>

<!-- Purple -->
<rect x="360" y="106" width="36" height="36" rx="18" fill="#8B5CF6"/>

<!-- Pink -->
<rect x="404" y="106" width="36" height="36" rx="18" fill="#EC4899"/>

<!-- Slate -->
<rect x="448" y="106" width="36" height="36" rx="18" fill="#64748B"/>

<!-- + add custom button -->
<rect x="492" y="106" width="36" height="36" rx="18" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1.5"/>
<text x="510" y="130" font-size="18" fill="#9CA3AF" text-anchor="middle">+</text>

<!-- note -->
<text x="228" y="170" font-size="10" fill="#9CA3AF">選択は即時反映・即時保存。設定ファイルには保存されません。</text>

<!-- ── アプリの起動 section ── -->
<rect x="216" y="204" width="664" height="106" rx="12" fill="#FFFFFF" filter="url(#s)"/>
<text x="228" y="228" font-size="13" font-weight="bold" fill="#1A1A2E">アプリの起動</text>
<line x1="216" y1="236" x2="880" y2="236" stroke="#F3F4F6"/>

<!-- 起動時に監視を開始 toggle -->
<text x="228" y="262" font-size="13" fill="#374151">起動時に監視を開始</text>
<text x="228" y="276" font-size="10" fill="#9CA3AF">アプリ起動後に自動で監視を開始します</text>
<!-- toggle OFF -->
<rect x="796" y="252" width="44" height="24" rx="12" fill="#D1D5DB"/>
<circle cx="808" cy="264" r="10" fill="white"/>
<line x1="216" y1="286" x2="880" y2="286" stroke="#F3F4F6"/>

<!-- Windowsログイン時に起動 toggle -->
<text x="228" y="298" font-size="13" fill="#374151">Windows ログイン時に起動</text>
<!-- toggle OFF -->
<rect x="796" y="286" width="44" height="24" rx="12" fill="#D1D5DB"/>
<circle cx="808" cy="298" r="10" fill="white"/>

<!-- ── 基本設定 section ── -->
<rect x="216" y="322" width="664" height="208" rx="12" fill="#FFFFFF" filter="url(#s)"/>
<text x="228" y="346" font-size="13" font-weight="bold" fill="#1A1A2E">基本設定</text>
<line x1="216" y1="354" x2="880" y2="354" stroke="#F3F4F6"/>

<!-- Usage Page -->
<text x="228" y="380" font-size="12" fill="#374151">Usage Page</text>
<text x="228" y="394" font-size="10" fill="#9CA3AF">Raw HID デバイス識別用 (16進数)</text>
<rect x="700" y="368" width="160" height="30" rx="8" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1"/>
<text x="760" y="388" font-size="12" fill="#374151" text-anchor="middle" font-family="'Courier New',Consolas,monospace">0xFF60</text>
<line x1="216" y1="410" x2="880" y2="410" stroke="#F3F4F6"/>

<!-- Usage -->
<text x="228" y="436" font-size="12" fill="#374151">Usage</text>
<text x="228" y="450" font-size="10" fill="#9CA3AF">Raw HID デバイス識別用 (16進数)</text>
<rect x="700" y="424" width="160" height="30" rx="8" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1"/>
<text x="760" y="444" font-size="12" fill="#374151" text-anchor="middle" font-family="'Courier New',Consolas,monospace">0x0061</text>
<line x1="216" y1="466" x2="880" y2="466" stroke="#F3F4F6"/>

<!-- 保存 / 更新 buttons -->
<rect x="716" y="482" width="76" height="30" rx="15" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#s)"/>
<text x="754" y="502" font-size="12" fill="#374151" text-anchor="middle">更新</text>
<rect x="800" y="482" width="76" height="30" rx="15" fill="#EF5B25"/>
<text x="838" y="502" font-size="12" font-weight="bold" fill="white" text-anchor="middle">保存</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580" font-family="'Hiragino Sans','Meiryo','Segoe UI',sans-serif">
<defs>
  <filter id="s" x="-6%" y="-8%" width="112%" height="120%">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#BCC7D4" flood-opacity="0.45"/>
  </filter>
</defs>

<rect width="900" height="580" fill="#F1F3F6"/>

<!-- ── Sidebar ── -->
<rect width="200" height="580" fill="#FFFFFF"/>
<line x1="200" y1="0" x2="200" y2="580" stroke="#E8ECF1"/>
<text x="20" y="37" font-size="14" font-weight="bold" fill="#1A1A2E">Keylink Studio</text>

<text x="30" y="72" font-size="13" fill="#4B5563">デバイス</text>
<text x="30" y="110" font-size="13" fill="#4B5563">レイヤールール</text>
<text x="30" y="148" font-size="13" fill="#4B5563">アクション</text>
<!-- 時刻同期 ← selected -->
<rect x="8" y="164" width="184" height="34" rx="8" fill="#FEF0EB"/>
<rect x="20" y="174" width="3" height="14" rx="2" fill="#EF5B25"/>
<text x="30" y="186" font-size="13" font-weight="bold" fill="#EF5B25">時刻同期</text>

<text x="30" y="224" font-size="13" fill="#4B5563">AI 使用量</text>
<text x="30" y="262" font-size="13" fill="#4B5563">キーマップ表示</text>
<text x="30" y="300" font-size="13" fill="#4B5563">設定</text>

<rect x="14" y="540" width="76" height="28" rx="14" fill="#F0F4F8"/>
<rect x="16" y="542" width="36" height="24" rx="12" fill="#EF5B25"/>
<text x="34" y="559" font-size="11" font-weight="bold" fill="white" text-anchor="middle">JP</text>
<text x="76" y="559" font-size="11" fill="#9CA3AF" text-anchor="middle">EN</text>

<!-- ── Content ── -->
<text x="220" y="37" font-size="18" font-weight="bold" fill="#1A1A2E">時刻同期</text>

<!-- 保存 button -->
<rect x="776" y="17" width="104" height="34" rx="17" fill="#EF5B25"/>
<text x="828" y="39" font-size="13" font-weight="bold" fill="white" text-anchor="middle">保存</text>

<!-- Settings card -->
<rect x="216" y="56" width="540" height="490" rx="12" fill="#FFFFFF" filter="url(#s)"/>

<!-- 時刻同期 enable row -->
<text x="232" y="90" font-size="13" font-weight="bold" fill="#1A1A2E">時刻同期</text>
<text x="232" y="108" font-size="11" fill="#9CA3AF">TIME_SYNC packet を監視中に送信します</text>
<!-- toggle ON -->
<rect x="696" y="78" width="44" height="24" rx="12" fill="#EF5B25"/>
<circle cx="730" cy="90" r="10" fill="white"/>
<line x1="216" y1="122" x2="756" y2="122" stroke="#F3F4F6"/>

<!-- 表示形式 row -->
<text x="232" y="152" font-size="13" font-weight="bold" fill="#1A1A2E">表示形式</text>
<!-- Option buttons: 時:分 selected (凹), 時:分:秒, 年月日, 月日 -->
<rect x="232" y="162" width="110" height="34" rx="8" fill="#E8ECF1"/>
<text x="287" y="184" font-size="12" font-weight="bold" fill="#EF5B25" text-anchor="middle">時:分</text>
<text x="287" y="196" font-size="9" fill="#9CA3AF" text-anchor="middle">14:30</text>

<rect x="350" y="162" width="110" height="34" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
<text x="405" y="184" font-size="12" fill="#374151" text-anchor="middle">時:分:秒</text>
<text x="405" y="196" font-size="9" fill="#9CA3AF" text-anchor="middle">14:30:05</text>

<rect x="468" y="162" width="110" height="34" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
<text x="523" y="180" font-size="12" fill="#374151" text-anchor="middle">年月日</text>

<rect x="586" y="162" width="110" height="34" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
<text x="641" y="180" font-size="12" fill="#374151" text-anchor="middle">月日</text>
<line x1="216" y1="208" x2="756" y2="208" stroke="#F3F4F6"/>

<!-- 時計表示 row -->
<text x="232" y="238" font-size="13" font-weight="bold" fill="#1A1A2E">時計表示</text>
<text x="232" y="256" font-size="11" fill="#9CA3AF">12時間表示に切り替えます</text>
<!-- toggle OFF -->
<rect x="696" y="228" width="44" height="24" rx="12" fill="#D1D5DB"/>
<circle cx="708" cy="240" r="10" fill="white"/>
<line x1="216" y1="272" x2="756" y2="272" stroke="#F3F4F6"/>

<!-- 同期間隔 row -->
<text x="232" y="302" font-size="13" font-weight="bold" fill="#1A1A2E">同期間隔</text>
<text x="232" y="320" font-size="11" fill="#9CA3AF">定期補正の間隔</text>
<!-- input: 60 -->
<rect x="642" y="294" width="72" height="30" rx="8" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1"/>
<text x="672" y="314" font-size="13" fill="#374151" text-anchor="middle" font-family="'Courier New',Consolas,monospace">60</text>
<text x="724" y="314" font-size="12" fill="#6B7280">秒</text>
<line x1="216" y1="336" x2="756" y2="336" stroke="#F3F4F6"/>

<!-- タイムゾーン row -->
<text x="232" y="366" font-size="13" font-weight="bold" fill="#1A1A2E">タイムゾーン</text>
<text x="232" y="384" font-size="11" fill="#9CA3AF">空欄なら OS の設定を使用します</text>
<!-- dropdown: 自動 -->
<rect x="604" y="356" width="132" height="30" rx="8" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1"/>
<text x="662" y="376" font-size="12" fill="#374151" text-anchor="middle">自動</text>
<text x="726" y="376" font-size="10" fill="#9CA3AF" text-anchor="middle">▼</text>
<line x1="216" y1="400" x2="756" y2="400" stroke="#F3F4F6"/>

<!-- advanced preview (collapsed) -->
<text x="232" y="430" font-size="12" fill="#9CA3AF">► Advanced</text>
</svg>

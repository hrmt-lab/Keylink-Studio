<rect class="card" x="0" y="126" width="628" height="456" rx="12"/>
<line x1="0" y1="194" x2="628" y2="194" stroke="#e5e7eb"/>
<line x1="0" y1="354" x2="628" y2="354" stroke="#e5e7eb"/>
<line x1="0" y1="426" x2="628" y2="426" stroke="#e5e7eb"/>
<line x1="0" y1="498" x2="628" y2="498" stroke="#e5e7eb"/>
<text class="text label" x="28" y="160" font-weight="700">時刻同期</text><text class="text small" x="28" y="180" fill="#667085">TIME_SYNC packet を送信します</text><rect x="548" y="150" width="48" height="24" rx="12" fill="#5f789c"/><circle cx="582" cy="162" r="10" fill="#fff"/>
<text class="text label" x="28" y="228" font-weight="700">表示形式</text>
<rect class="optionSel" x="28" y="246" width="270" height="40" rx="8"/><text class="text small" x="44" y="270" fill="#5f789c">時:分</text><text class="text mono small" x="250" y="270" text-anchor="end" fill="#9ca3af">14:30</text>
<rect class="option" x="314" y="246" width="270" height="40" rx="8"/><text class="text small" x="330" y="270">時:分:秒</text><text class="text mono small" x="566" y="270" text-anchor="end" fill="#9ca3af">14:30:05</text>
<rect class="option" x="28" y="296" width="270" height="40" rx="8"/><text class="text small" x="44" y="320">年月日</text><text class="text mono small" x="250" y="320" text-anchor="end" fill="#9ca3af">2025-01-15</text>
<rect class="option" x="314" y="296" width="270" height="40" rx="8"/><text class="text small" x="330" y="320">月日</text><text class="text mono small" x="566" y="320" text-anchor="end" fill="#9ca3af">01-15</text>
<text class="text label" x="28" y="390" font-weight="700">時計表示</text><text class="text small" x="28" y="410" fill="#667085">12時間表示に切り替えます</text><rect x="548" y="376" width="48" height="24" rx="12" fill="#cbd5e1"/><circle cx="560" cy="388" r="10" fill="#fff"/>

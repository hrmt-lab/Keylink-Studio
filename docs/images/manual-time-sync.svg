<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='720' viewBox='0 0 1200 720'>
<defs>
<style>
  .bg{fill:#f3f4f6}.side{fill:#5f789c}.card{fill:#fff;stroke:#d7d7d7;stroke-width:1.5}.muted{fill:#8b95a6}.text{fill:#1f2937;font-family:'Segoe UI','Yu Gothic UI',sans-serif}.title{font-size:24px;font-weight:700}.sub{font-size:14px;fill:#667085}.nav{font-size:15px;fill:#e9eef7;font-weight:600}.label{font-size:13px}.small{font-size:11px}.btn{fill:#5f789c}.btn2{fill:#fff;stroke:#d1d5db}.pill{fill:#e5e7eb}.ok{fill:#bff7d7}.key{fill:#fff;stroke:#d1d5db}.panel{fill:#eeeeee;stroke:#d1d5db}.selected{fill:#eef3fa;stroke:#b7c3d7}.ghost{fill:#f1f1f1;stroke:#d0d0d0}.option{fill:#fff;stroke:#d1d5db}.optionSel{fill:#f3f7ff;stroke:#5f789c;stroke-width:1.5}.mono{font-family:'Segoe UI Mono','Consolas',monospace}
</style>
</defs>
<rect class="bg" x="0" y="0" width="1200" height="720"/>
<rect class="side" x="0" y="0" width="210" height="720"/>
<rect x="20" y="28" width="48" height="48" rx="12" fill="#6f86a8" stroke="#8da0bd"/>
<text class="text nav" x="82" y="59">RawHID Host</text>
<text class="text nav" x="24" y="132">▦  ダッシュボード</text>

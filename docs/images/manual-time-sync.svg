<text class="text label" x="28" y="534" font-weight="700">タイムゾーン</text><text class="text small" x="28" y="554" fill="#667085">空欄なら OS の現在値を使用</text><rect class="btn2" x="436" y="520" width="100" height="34" rx="8"/><text class="text mono" x="520" y="542" font-size="13" text-anchor="end">自動</text><text class="text small" x="548" y="542" fill="#667085">分</text>
</g>

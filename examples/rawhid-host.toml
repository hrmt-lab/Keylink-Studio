# RawHID Host configuration

[app]
# Start monitoring automatically when the app launches.
start_monitoring_on_launch = false

[polling]
interval_ms = 500

[hid]
usage_page = 65376 # 0xFF60
usage = 97         # 0x61
hello_timeout_ms = 200

[layer_switch]
enabled = true

# Layer rules are configured per device, keyed by the stable uid returned
# in DEVICE_HELLO. Devices without an entry are not layer-managed.
#[layer_switch.devices."uid:7a91c3e4d102ab55"]
#display_name = "Example Keyboard"
#enabled = true
#
# exe matches the full executable file name, including ".exe".
# Prefer path rules when the same exe name can appear in multiple locations.
#[[layer_switch.devices."uid:7a91c3e4d102ab55".rules]]
#name = "Notepad"
#exe = "notepad.exe"
#layer = 1
#
#[[layer_switch.devices."uid:7a91c3e4d102ab55".rules]]
#name = "Browser title example"
#title = "GitHub"
#layer = 2

[time]
enabled = false
format_hint = "time_hm"
clock_mode = "24h"
periodic_sync_sec = 60
# tz_offset_min = 540

[ai_usage]
enabled = false
poll_interval_sec = 300
stale_after_sec = 900

[ai_usage.codex]
enabled = true
# When sessions_dir is omitted, the core default is used.
# Codex rate_limits are preferred. Local history is only a fallback activity estimate.
# sessions_dir = "C:\\Users\\<user>\\.codex\\sessions"
history_fallback_enabled = true
allow_activity_baseline = false
# Activity estimate baselines are not quota limits.
activity_five_hour_token_baseline = 0
activity_seven_day_token_baseline = 0

[ai_usage.claude_code]
enabled = true
# When credentials_path is omitted, the core default is used.
# Claude OAuth usage API is experimental / best-effort. Do not log or display token contents.
# credentials_path = "C:\\Users\\<user>\\.claude\\.credentials.json"
api_timeout_sec = 10
